name: Python tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Unit tests
        run: PYTHONPATH=src python -m unittest -v

      - name: Compile check
        run: python -m compileall -q src tests

      - name: Build distributions
        run: python -m pip wheel --no-deps --no-build-isolation --wheel-dir /tmp/wheels .

      - name: User-local installer integration
        run: ./scripts/test-install-user-service.sh
